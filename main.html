<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f6f9fc;
    }

    h2 {
      color: #3b99e0;
      text-align: center;
      margin-bottom: 30px;
    }

    .summary {
      background-color: #f7fbff;
      border-top: 3px solid #5ea4f3;
      padding: 20px;
    }

    .product {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- Heading -->
	  <h2 class="block-heading">Shopping cart</h2>

  <div class="row">

    <!-- LEFT SIDE (Products) -->
    <div class="col-lg-8">

      <!-- Product 1 -->
      <div class="product d-flex align-items-center justify-content-between">
        <img src="https://via.placeholder.com/80" class="img-fluid">

        <div>
          <h6>I am very sorry</h6>
          <p class="text-muted">
            Display: 5 inches<br>
            RAM: 4GB<br>
            Memory: 32GB
          </p>
        </div>

        <input type="number" class="form-control w-25" value="1">

        <p>$120</p>
      </div>

      <!-- Product 2 -->
      <div class="product d-flex align-items-center justify-content-between">
        <img src="https://via.placeholder.com/80" class="img-fluid">

        <div>
          <h6>I am very sorry</h6>
          <p class="text-muted">
            Display: 5 inches<br>
            RAM: 4GB<br>
            Memory: 32GB
          </p>
        </div>

        <input type="number" class="form-control w-25" value="1">

        <p>$120</p>
      </div>

      <!-- Product 3 -->
      <div class="product d-flex align-items-center justify-content-between">
        <img src="https://via.placeholder.com/80" class="img-fluid">

        <div>
          <h6>I am very sorry</h6>
          <p class="text-muted">
            Display: 5 inches<br>
            RAM: 4GB<br>
            Memory: 32GB
          </p>
        </div>

        <input type="number" class="form-control w-25" value="1">

        <p>$120</p>
      </div>

    </div>

    <!-- RIGHT SIDE (Summary) -->
    <div class="col-lg-4">

      <div class="summary">
        <h5>Summary</h5>

        <div class="d-flex justify-content-between">
          <p>Subtotal</p>
          <p>$360</p>
        </div>

        <div class="d-flex justify-content-between">
          <p>Discount</p>
          <p>$0</p>
        </div>

        <div class="d-flex justify-content-between">
          <p>Shipping</p>
          <p>$0</p>
        </div>

        <div class="d-flex justify-content-between font-weight-bold">
          <p>Total</p>
          <p>$360</p>
        </div>

        <button class="btn btn-primary btn-block">
          checkout
        </button>
      </div>

    </div>

  </div>

</div>

</body>
</html>
